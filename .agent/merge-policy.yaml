# Generated by rucksack. Secret values must stay in GitHub/VM secret stores, not this file.
schema_version: 1
mode: disabled
merge:
  method: squash
  close_linked_issues: true
eligible:
  base_branch_patterns:
    - main
    - staging
  head_branch_patterns:
    - "codex/issue-*-rucksack"
    - "claude/issue-*-rucksack"
  automatic_path_patterns:
    - "docs/**"
    - "tests/**"
    - "*.md"
    - "README.md"
human_opt_in:
  commands:
    - "/rucksack merge"
required:
  checks:
    - checks
  # approved = GitHub approval only; reviewed = approved or trusted independent review evidence;
  # none = no review gate. Defaults stay conservative.
  review_state: approved
  linked_issue: true
  evidence_manifest: true
  clean_evidence: true
  secret_scan: true
forbidden:
  labels:
    - do-not-merge
    - blocked
    - rucksack-blocked
    - rucksack-human-merge
  requested_changes: true
  merge_conflicts: true
  failing_checks: true
  unknown_check_state: true
  secret_scan_failure: true
  untrusted_branch_owner: true
  fork_branches: true
  dirty_evidence: true
  missing_issue_linkage: true
production_gates:
  branches:
    - main
    - master
    - production
    - "release/**"
  deploy_paths:
    - ".github/**"
    - "infra/**"
    - "deploy/**"
    - "migrations/**"
    - "billing/**"
    - "auth/**"
    - "**/auth/**"
    - ".agent/deploy.yaml"
    - ".agent/merge-policy.yaml"
    - "scripts/agent-evidence"
  require_human_opt_in: true
notes:
  safety: "Disabled by default. Automatic is classification-only until an immutable-base publisher exists; live execution applies the exact-head human-command safety floor."
  approval_boundary: "Resolving a human gate is not merge approval; human-command-only requires /rucksack merge <full-current-head-sha> on the PR."
