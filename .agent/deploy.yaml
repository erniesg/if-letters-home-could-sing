# Generated by rucksack. Names only; do not store secret values here.
version: 1
ci_cd:
  provider: github-actions
  target: vm
  profile: erniesg-ai-vm
  hosted_execution: held
  publisher_boundary_required: true
  enabled_variable: RUCKSACK_DEPLOY_ENABLED
  branches:
    staging: master
    production: master
  runtime:
    kind: dockerfile
    dockerfile: Dockerfile
    compose_file: infra/vm/compose.yaml
    container_port: 8000
  environments:
    staging:
      github_environment: staging
      auto_deploy: false
      remote_path: /opt/rucksack-app/staging/erniesg-if-letters-home-could-sing
      compose_project: rucksack-staging-erniesg-if-letters-home-could-sing
      healthcheck_var: RUCKSACK_HEALTHCHECK_URL
      required_secrets:
      - RUCKSACK_VM_HOST
      - RUCKSACK_VM_USER
      - RUCKSACK_VM_SSH_KEY
      - RUCKSACK_APP_ENV
    production:
      github_environment: production
      auto_deploy: false
      approval_required: true
      remote_path: /opt/rucksack-app/production/erniesg-if-letters-home-could-sing
      compose_project: rucksack-production-erniesg-if-letters-home-could-sing
      healthcheck_var: RUCKSACK_HEALTHCHECK_URL
      required_secrets:
      - RUCKSACK_VM_HOST
      - RUCKSACK_VM_USER
      - RUCKSACK_VM_SSH_KEY
      - RUCKSACK_APP_ENV
  iac:
    preferred_tool: tofu
    pr:
      - tofu fmt -check -recursive
      - tofu init -backend=false
      - tofu validate
    deploy:
      - tofu plan
      - "never run tofu apply from pull_request; production apply requires protected environment approval"
  rollback:
    previous_release_file: previous-release
deploy_qa:
  repair_issue:
    title: "Rucksack deploy QA repair"
    marker: "<!-- rucksack-deploy-qa-repair -->"
  environments:
    staging:
      target_url_var: RUCKSACK_HEALTHCHECK_URL
      on_failure: queue-repair
      allowed_secrets:
        - RUCKSACK_VM_HOST
        - RUCKSACK_VM_USER
        - RUCKSACK_VM_SSH_KEY
        - RUCKSACK_APP_ENV
      artifact_outputs:
        - ".agent/deploy-qa/staging/pre-deploy/result.json"
        - ".agent/deploy-qa/staging/post-deploy/result.json"
      pre_deploy:
        - name: agent-evidence
          lane: dev-local
          command: 'if [ -x scripts/agent-evidence ]; then scripts/agent-evidence; else echo "scripts/agent-evidence not present; skipping pre-deploy evidence"; fi'
      post_deploy:
        - name: healthcheck
          lane: staging
          command: 'if [ -n "$RUCKSACK_DEPLOY_TARGET_URL" ]; then curl --fail --silent --show-error "$RUCKSACK_DEPLOY_TARGET_URL" >/dev/null; else echo "RUCKSACK_DEPLOY_TARGET_URL not set; skipping healthcheck"; fi'
    production:
      target_url_var: RUCKSACK_HEALTHCHECK_URL
      on_failure: human-incident
      rollback: "recommend manual rollback or hold only; never execute automatically"
      allowed_secrets:
        - RUCKSACK_VM_HOST
        - RUCKSACK_VM_USER
        - RUCKSACK_VM_SSH_KEY
        - RUCKSACK_APP_ENV
      artifact_outputs:
        - ".agent/deploy-qa/production/pre-deploy/result.json"
        - ".agent/deploy-qa/production/post-deploy/result.json"
      pre_deploy:
        - name: agent-evidence
          lane: dev-local
          command: 'if [ -x scripts/agent-evidence ]; then scripts/agent-evidence; else echo "scripts/agent-evidence not present; skipping pre-deploy evidence"; fi'
      post_deploy:
        - name: healthcheck
          lane: production
          command: 'if [ -n "$RUCKSACK_DEPLOY_TARGET_URL" ]; then curl --fail --silent --show-error "$RUCKSACK_DEPLOY_TARGET_URL" >/dev/null; else echo "RUCKSACK_DEPLOY_TARGET_URL not set; skipping healthcheck"; fi'
