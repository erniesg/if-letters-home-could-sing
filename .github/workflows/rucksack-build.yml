# Generated by rucksack. Hosted agent execution is fail-closed.
name: Rucksack Build From Issue

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number to build from"
        required: true
        type: string
      provider:
        description: "Provider: codex-action | vm-codex | claude"
        required: false
        type: string
        default: "vm-codex"
      prompt_override:
        description: "Ignored while hosted agent execution is disabled"
        required: false
        type: string

# No repository token permission is granted. This workflow does not check out
# the repository, call an agent, run repository scripts, or publish a branch.
permissions: {}

concurrency:
  group: rucksack-build-${{ github.repository }}-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  refuse-hosted-build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Refuse hosted agent execution
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REQUESTED_PROVIDER: ${{ inputs.provider || 'vm-codex' }}
        run: |
          set -euo pipefail
          case "$ISSUE_NUMBER" in
            ''|0|*[!0-9]*) echo "invalid issue number" >&2; exit 2 ;;
          esac
          case "$REQUESTED_PROVIDER" in
            vm-codex|claude)
              echo "This hosted workflow cannot queue $REQUESTED_PROVIDER work." >&2
              echo "Use the Rucksack Autopilot queue for a supervised VM run; autonomous drain remains held until publisher credentials are isolated." >&2
              exit 2
              ;;
            codex-action)
              echo "Hosted codex-action execution is disabled until a reviewed tokenless build/publisher boundary is installed." >&2
              echo "Use only a supervised vm-codex run for issue #$ISSUE_NUMBER; autonomous drain remains held until publisher credentials are isolated." >&2
              exit 2
              ;;
            *)
              echo "unsupported provider" >&2
              exit 2
              ;;
          esac
