# Generated by rucksack. Credential-bearing hosted deploy execution is fail-closed.
name: Rucksack VM Deploy (Held)

on:
  workflow_dispatch:

# No repository token permission is granted. This workflow does not check out
# the repository, read credentials, execute branch code, or publish a deploy.
permissions: {}

concurrency:
  group: rucksack-deploy-held-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refuse-hosted-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Refuse credential-bearing hosted deploy
        shell: bash
        run: |
          set -euo pipefail
          cat >&2 <<'EOF'
          Rucksack hosted VM deployment is disabled.
          Restore it only after a reviewed tokenless build artifact and a separate fixed publisher boundary exist.
          EOF
          exit 2
