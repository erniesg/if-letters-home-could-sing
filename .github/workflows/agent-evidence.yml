# Generated by rucksack.
# Fork-safe: this workflow intentionally reads no repository/environment secrets.
# Evidence stays artifact-only; no branch-created value reaches a write-token job.
name: agent-evidence

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evidence:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Run and validate agent evidence
        id: evidence
        shell: bash
        env:
          GITHUB_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          RUCKSACK_EXPECTED_REPOSITORY: ${{ github.repository }}
          RUCKSACK_EXPECTED_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          if [ -L .agent ] || [ -L .agent/evidence ]; then
            echo "Refusing symlinked evidence directory." >&2
            exit 1
          fi
          rm -rf -- .agent/evidence
          mkdir -p -- .agent/evidence

          set +e
          env -u GITHUB_OUTPUT -u GITHUB_ENV -u GITHUB_PATH -u GITHUB_STEP_SUMMARY             bash scripts/agent-evidence
          status=$?
          set -e

          manifest="$RUNNER_TEMP/rucksack-agent-evidence-manifest.json"
          candidate_list="$RUNNER_TEMP/rucksack-agent-evidence-candidates.bin"
          rm -f -- "$manifest" "$candidate_list"
          manifests=()
          if ! find .agent/evidence -name manifest.json -type f -print0 > "$candidate_list"; then
            echo "Unable to enumerate evidence manifests." >&2
            status=1
          else
            while IFS= read -r -d '' candidate; do
              manifests+=("$candidate")
            done < "$candidate_list"
          fi
          rm -f -- "$candidate_list"

          if [ -L .agent/evidence ] || [ "${#manifests[@]}" -ne 1 ]; then
            echo "Expected exactly one regular evidence manifest; found ${#manifests[@]}." >&2
            status=1
          else
            candidate="${manifests[0]}"
            if [ ! -f "$candidate" ] || [ -L "$candidate" ]; then
              echo "Evidence manifest must be one regular file." >&2
              status=1
            elif ! EXPECTED_HEAD_SHA="$GITHUB_HEAD_SHA" EXPECTED_REPOSITORY="$RUCKSACK_EXPECTED_REPOSITORY" EXPECTED_BRANCH="$RUCKSACK_EXPECTED_BRANCH" EVIDENCE_STATUS="$status" CANONICAL_MANIFEST="$manifest" node - "$candidate" <<'RUCKSACK_VALIDATE_MANIFEST'
          const fs = require("node:fs");
          const path = require("node:path");

          const manifestPath = process.argv[2];
          const expectedHead = String(process.env.EXPECTED_HEAD_SHA || "").trim().toLowerCase();
          const expectedRepository = String(process.env.EXPECTED_REPOSITORY || "").trim();
          const expectedBranch = String(process.env.EXPECTED_BRANCH || "").trim();
          const evidenceStatus = Number(process.env.EVIDENCE_STATUS);
          const canonicalPath = String(process.env.CANONICAL_MANIFEST || "");
          const controlCharacters = /[\u0000-\u001f\u007f\u2028\u2029]/;
          const allowedLaneIds = new Set([
            "lint", "build", "type-check", "unit", "test", "e2e",
            "rust-check", "rust-test", "python-test",
          ]);

          function fail(message) {
            console.error(`evidence manifest rejected: ${message}`);
            process.exit(1);
          }

          function isRecord(value) {
            return value !== null && typeof value === "object" && !Array.isArray(value);
          }

          function rejectControlCharacters(value, location) {
            if (typeof value === "string") {
              if (controlCharacters.test(value)) fail(`${location} contains a control character`);
              if (value.length > 8192) fail(`${location} is too long`);
              return;
            }
            if (Array.isArray(value)) {
              if (value.length > 200) fail(`${location} has too many items`);
              value.forEach((item, index) => rejectControlCharacters(item, `${location}[${index}]`));
              return;
            }
            if (isRecord(value)) {
              for (const [key, item] of Object.entries(value)) {
                rejectControlCharacters(key, `${location} key`);
                rejectControlCharacters(item, `${location}.${key}`);
              }
            }
          }

          function exactKeys(value, required, optional, location) {
            if (!isRecord(value)) fail(`${location} must be an object`);
            const allowed = new Set([...required, ...optional]);
            for (const key of required) {
              if (!Object.hasOwn(value, key)) fail(`${location}.${key} is required`);
            }
            for (const key of Object.keys(value)) {
              if (!allowed.has(key)) fail(`${location}.${key} is not allowed`);
            }
          }

          function stringValue(value, location, { allowEmpty = false } = {}) {
            if (typeof value !== "string") fail(`${location} must be a string`);
            if (!allowEmpty && !value) fail(`${location} must not be empty`);
            return value;
          }

          function nonNegativeInteger(value, location) {
            if (!Number.isInteger(value) || value < 0) fail(`${location} must be a non-negative integer`);
          }

          function stringArray(value, location) {
            if (!Array.isArray(value)) fail(`${location} must be an array`);
            value.forEach((item, index) => stringValue(item, `${location}[${index}]`));
            if (new Set(value).size !== value.length) fail(`${location} must not contain duplicates`);
            return value;
          }

          function relativePath(value, location) {
            const candidate = stringValue(value, location);
            if (path.isAbsolute(candidate) || candidate.split(/[\\/]/).includes("..")) {
              fail(`${location} must stay inside the repository`);
            }
            return candidate;
          }

          if (!manifestPath) fail("manifest path is required");
          if (!canonicalPath || controlCharacters.test(canonicalPath)) fail("canonical manifest path is invalid");
          if (!/^[0-9a-f]{40}$/.test(expectedHead)) fail("expected event head must be a full commit SHA");
          if (!/^[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+$/.test(expectedRepository)) {
            fail("expected event repository must be OWNER/REPO");
          }
          if (!expectedBranch || expectedBranch.length > 255 || controlCharacters.test(expectedBranch)) {
            fail("expected event branch is invalid");
          }
          if (!Number.isInteger(evidenceStatus) || evidenceStatus < 0 || evidenceStatus > 255) {
            fail("evidence status must be an exit code");
          }

          let stats;
          try {
            stats = fs.lstatSync(manifestPath);
          } catch (error) {
            fail(`manifest is not readable: ${error.message}`);
          }
          if (!stats.isFile() || stats.isSymbolicLink()) fail("manifest must be one regular file");
          if (stats.size > 1024 * 1024) fail("manifest exceeds 1 MiB");

          let manifest;
          try {
            manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
          } catch (error) {
            fail(`manifest is not valid JSON: ${error.message}`);
          }
          rejectControlCharacters(manifest, "manifest");
          exactKeys(
            manifest,
            [
              "schema_version", "run_id", "repo", "branch", "commit", "dirty",
              "started_at", "ended_at", "duration_ms", "agent_version", "invocation",
              "lanes_run", "runner", "lanes", "artifacts", "result", "required_failures",
            ],
            ["blocked_reason", "caveats"],
            "manifest",
          );

          if (manifest.schema_version !== "1") fail("manifest.schema_version must be 1");
          stringValue(manifest.run_id, "manifest.run_id");
          if (stringValue(manifest.repo, "manifest.repo") !== expectedRepository) {
            fail("manifest.repo must equal the immutable event repository");
          }
          if (stringValue(manifest.branch, "manifest.branch") !== expectedBranch) {
            fail("manifest.branch must equal the immutable event branch");
          }
          const commit = stringValue(manifest.commit, "manifest.commit").toLowerCase();
          if (!/^[0-9a-f]{40}$/.test(commit) || commit !== expectedHead) {
            fail("manifest.commit must equal the immutable event head");
          }
          if (typeof manifest.dirty !== "boolean") fail("manifest.dirty must be a boolean");
          for (const field of ["started_at", "ended_at"]) {
            const value = stringValue(manifest[field], `manifest.${field}`);
            if (Number.isNaN(Date.parse(value))) fail(`manifest.${field} must be an ISO timestamp`);
          }
          nonNegativeInteger(manifest.duration_ms, "manifest.duration_ms");
          if (!/^[0-9a-f]{64}$/i.test(stringValue(manifest.agent_version, "manifest.agent_version"))) {
            fail("manifest.agent_version must be a SHA-256 digest");
          }

          exactKeys(
            manifest.invocation,
            ["argv", "npm_config_e2e", "npm_config_only"],
            [],
            "manifest.invocation",
          );
          stringArray(manifest.invocation.argv, "manifest.invocation.argv");
          stringValue(manifest.invocation.npm_config_e2e, "manifest.invocation.npm_config_e2e", { allowEmpty: true });
          stringValue(manifest.invocation.npm_config_only, "manifest.invocation.npm_config_only", { allowEmpty: true });

          exactKeys(manifest.runner, ["provider", "os", "node"], [], "manifest.runner");
          stringValue(manifest.runner.provider, "manifest.runner.provider");
          stringValue(manifest.runner.os, "manifest.runner.os");
          stringValue(manifest.runner.node, "manifest.runner.node");

          const laneIds = [];
          if (!Array.isArray(manifest.lanes)) fail("manifest.lanes must be an array");
          manifest.lanes.forEach((lane, index) => {
            const location = `manifest.lanes[${index}]`;
            exactKeys(
              lane,
              ["id", "command", "required", "status", "exit_code", "duration_ms", "log_path"],
              [],
              location,
            );
            const laneId = stringValue(lane.id, `${location}.id`);
            if (!allowedLaneIds.has(laneId)) fail(`${location}.id is not an allowed validation lane`);
            laneIds.push(laneId);
            stringValue(lane.command, `${location}.command`);
            if (typeof lane.required !== "boolean") fail(`${location}.required must be a boolean`);
            if (!new Set(["passed", "failed"]).has(lane.status)) fail(`${location}.status is invalid`);
            nonNegativeInteger(lane.exit_code, `${location}.exit_code`);
            nonNegativeInteger(lane.duration_ms, `${location}.duration_ms`);
            relativePath(lane.log_path, `${location}.log_path`);
            if ((lane.status === "passed") !== (lane.exit_code === 0)) {
              fail(`${location}.status does not match its exit code`);
            }
          });
          if (new Set(laneIds).size !== laneIds.length) fail("manifest lane ids must be unique");

          const lanesRun = stringArray(manifest.lanes_run, "manifest.lanes_run");
          if (JSON.stringify(lanesRun) !== JSON.stringify(laneIds)) {
            fail("manifest.lanes_run must exactly match manifest.lanes");
          }
          const requiredFailures = stringArray(manifest.required_failures, "manifest.required_failures");
          const expectedFailures = manifest.lanes
            .filter((lane) => lane.required && lane.exit_code !== 0)
            .map((lane) => lane.id);
          if (JSON.stringify(requiredFailures) !== JSON.stringify(expectedFailures)) {
            fail("manifest.required_failures does not match failed required lanes");
          }

          if (!Array.isArray(manifest.artifacts)) fail("manifest.artifacts must be an array");
          let manifestArtifacts = 0;
          manifest.artifacts.forEach((artifact, index) => {
            const location = `manifest.artifacts[${index}]`;
            exactKeys(
              artifact,
              ["kind", "path"],
              ["sha256", "size_bytes", "repo_limit_mb", "storage"],
              location,
            );
            const kind = stringValue(artifact.kind, `${location}.kind`);
            const artifactPath = relativePath(artifact.path, `${location}.path`);
            if (Object.hasOwn(artifact, "sha256")) {
              const digest = stringValue(artifact.sha256, `${location}.sha256`);
              if (!/^[0-9a-f]{64}$/i.test(digest)) fail(`${location}.sha256 must be a SHA-256 digest`);
            }
            if (Object.hasOwn(artifact, "size_bytes")) nonNegativeInteger(artifact.size_bytes, `${location}.size_bytes`);
            if (
              Object.hasOwn(artifact, "repo_limit_mb") &&
              (typeof artifact.repo_limit_mb !== "number" || !Number.isFinite(artifact.repo_limit_mb) || artifact.repo_limit_mb <= 0)
            ) {
              fail(`${location}.repo_limit_mb must be a positive number`);
            }
            if (Object.hasOwn(artifact, "storage")) stringValue(artifact.storage, `${location}.storage`);
            if (kind === "manifest") {
              manifestArtifacts += 1;
              if (path.normalize(artifactPath) !== path.normalize(manifestPath)) {
                fail(`${location}.path must identify the validated manifest`);
              }
            }
          });
          if (manifestArtifacts !== 1) fail("manifest.artifacts must identify exactly one manifest");

          if (Object.hasOwn(manifest, "caveats")) stringArray(manifest.caveats, "manifest.caveats");
          if (!new Set(["passed", "failed", "blocked"]).has(manifest.result)) {
            fail("manifest.result is invalid");
          }
          if (manifest.result === "passed") {
            if (manifest.lanes.length === 0 || requiredFailures.length !== 0 || evidenceStatus !== 0) {
              fail("passed manifest is inconsistent with lanes or exit status");
            }
            if (Object.hasOwn(manifest, "blocked_reason")) fail("passed manifest must not contain blocked_reason");
          } else if (manifest.result === "failed") {
            if (requiredFailures.length === 0 || evidenceStatus !== 1) {
              fail("failed manifest is inconsistent with lanes or exit status");
            }
            if (Object.hasOwn(manifest, "blocked_reason")) fail("failed manifest must not contain blocked_reason");
          } else {
            stringValue(manifest.blocked_reason, "manifest.blocked_reason");
            if (manifest.lanes.length !== 0 || !new Set([2, 3, 4]).has(evidenceStatus)) {
              fail("blocked manifest is inconsistent with lanes or exit status");
            }
          }

          try {
            fs.writeFileSync(canonicalPath, `${JSON.stringify(manifest, null, 2)}\n`, { flag: "wx", mode: 0o600 });
          } catch (error) {
            fail(`canonical manifest could not be written: ${error.message}`);
          }
          console.log("validated one evidence manifest for the immutable event head");
          RUCKSACK_VALIDATE_MANIFEST
            then
              status=1
              rm -f -- "$manifest"
            elif [ ! -f "$manifest" ] || [ -L "$manifest" ]; then
              echo "Validator did not produce one canonical manifest." >&2
              status=1
              rm -f -- "$manifest"
            fi
          fi
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Summarize validated evidence
        if: always()
        shell: bash
        run: |
          manifest="$RUNNER_TEMP/rucksack-agent-evidence-manifest.json"
          if [ -f "$manifest" ]; then
            echo "## Agent Evidence" >> "$GITHUB_STEP_SUMMARY"
            node -e 'const fs=require("fs"); const m=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); console.log(`- Result: ${m.result}\n- Commit: ${m.commit}\n- Dirty: ${m.dirty === true ? "true" : "false"}\n- Lanes: ${m.lanes_run.join(", ") || "(none)"}\n- Required failures: ${m.required_failures.join(", ") || "(none)"}`)' "$manifest" >> "$GITHUB_STEP_SUMMARY"
            echo "- Artifact: \`agent-evidence-${{ github.run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Manifest artifact: \`agent-evidence-manifest-${{ github.run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No validated evidence manifest found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-evidence-${{ github.run_id }}
          path: .agent/evidence
          include-hidden-files: true
          if-no-files-found: warn

      - name: Upload validated evidence manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-evidence-manifest-${{ github.run_id }}
          path: ${{ runner.temp }}/rucksack-agent-evidence-manifest.json
          if-no-files-found: ignore

      - name: Fail if evidence failed
        if: always()
        run: exit "${{ steps.evidence.outputs.status || '1' }}"
