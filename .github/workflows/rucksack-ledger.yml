# Generated by rucksack. Hosted issue planning is fail-closed.
name: Rucksack Issue Ledger

on:
  workflow_dispatch:
    inputs:
      intent:
        description: "Ignored while hosted issue planning is disabled"
        required: false
        type: string
      model:
        description: "Ignored while hosted issue planning is disabled"
        required: false
        type: string
      effort:
        description: "Ignored while hosted issue planning is disabled"
        required: false
        type: string
      timeout_seconds:
        description: "Ignored while hosted issue planning is disabled"
        required: false
        type: string

# No repository token permission is granted. This workflow does not check out
# the repository, call an agent, install dependencies, seed issues, or publish.
permissions: {}

concurrency:
  group: rucksack-ledger-${{ github.repository }}
  cancel-in-progress: false

jobs:
  refuse-hosted-planning:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Refuse hosted generative issue planning
        run: |
          set -euo pipefail
          cat >&2 <<'EOF'
          Hosted Codex issue planning is disabled until planning and GitHub publication use separate credential boundaries.
          Run planning under a non-publisher identity with no App PEM, review the generated specs, then let a separate trusted publisher seed approved specs.
          EOF
          exit 2
