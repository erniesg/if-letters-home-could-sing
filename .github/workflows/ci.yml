# Generated by rucksack. PR jobs intentionally read no repository/environment secrets.
name: Rucksack CI

on:
  pull_request:
  push:
    branches: [master, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SCAN_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SCAN_SHA }}
          persist-credentials: false

      - name: Scan immutable commit for credentials
        run: |
          set -eu
          echo "secret scan: checking immutable commit for common private-key and token markers"
          token_marker='github''_pat_[A-Za-z0-9_]{20,}|gh''[pousr]_[A-Za-z0-9_]{20,}|sk-[A-Za-z0-9_-]{20,}|sk_(live|test)_[A-Za-z0-9]{16,}|glpat-[A-Za-z0-9_-]{20,}|npm_[A-Za-z0-9]{20,}|(xox[bcaprs]|xapp|xwfp|xoxe([.]xox[bp])?)-[A-Za-z0-9-]{20,}|(AKIA|ASIA)[0-9A-Z]{16}|https://hooks[.]slack[.]com/services/[A-Z0-9]{8,}/[A-Z0-9]{8,}/[A-Za-z0-9]{20,}|https://((canary|ptb)[.])?discord(app)?[.]com/api(/v[0-9]+)?/webhooks/[0-9]{10,}/[A-Za-z0-9._-]{20,}'
          private_key_marker='-----BEGIN ((RSA |OPENSSH |EC |DSA |ENCRYPTED )?PRIVATE[ ]KEY|PGP PRIVATE KEY BLOCK)-----'
          if ! git cat-file -e "$SCAN_SHA^{commit}" 2>/dev/null; then
            echo "secret scan failed: immutable commit is unavailable" >&2
            exit 1
          fi
          checked_out_sha="$(git rev-parse HEAD)"
          if [ "$checked_out_sha" != "$SCAN_SHA" ]; then
            echo "secret scan failed: checkout does not match immutable commit" >&2
            exit 1
          fi
          set +e
          git grep -q -E "($token_marker|$private_key_marker)" "$SCAN_SHA" -- .
          scan_status=$?
          set -e
          case "$scan_status" in
            0)
              echo "secret scan failed: a high-confidence credential marker was detected" >&2
              exit 1
              ;;
            1) ;;
            *)
              echo "secret scan failed: scanner error" >&2
              exit 1
              ;;
          esac

  checks:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python project dependencies
        run: |
          set -eu
          if [ ! -f pyproject.toml ] && [ ! -f requirements.txt ]; then
            echo "no Python project metadata; skipping Python dependency setup"
            exit 0
          fi
          python3 -m venv "$RUNNER_TEMP/rucksack-ci-venv"
          . "$RUNNER_TEMP/rucksack-ci-venv/bin/activate"
          python3 -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            python3 -m pip install -e '.[dev]' || python3 -m pip install -e .
          fi
          if [ -f requirements.txt ]; then
            python3 -m pip install -r requirements.txt
          fi

      - name: Set up Node project dependencies
        run: |
          set -eu
          if [ ! -f package.json ]; then
            echo "no package.json; skipping Node dependency setup"
            exit 0
          fi
          corepack enable || true
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
            runner=pnpm
          elif [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
            runner=yarn
          elif [ -f package-lock.json ]; then
            npm ci
            runner=npm
          else
            npm install
            runner=npm
          fi
          echo "$runner" > "$RUNNER_TEMP/rucksack-node-runner"

      - name: Agent evidence
        id: agent_evidence
        continue-on-error: true
        run: |
          set -u
          if [ -d "$RUNNER_TEMP/rucksack-ci-venv" ]; then
            . "$RUNNER_TEMP/rucksack-ci-venv/bin/activate"
          fi
          status=0
          if [ -x scripts/agent-evidence ]; then
            scripts/agent-evidence || status=$?
          else
            echo "scripts/agent-evidence not present; run rucksack init to add it"
          fi
          manifest="$RUNNER_TEMP/rucksack-ci-manifest.json"
          rm -f -- "$manifest"
          while IFS= read -r -d '' candidate; do
            if ! cp -- "$candidate" "$manifest"; then
              status=1
              rm -f -- "$manifest"
              break
            fi
          done < <(find .agent/evidence -name manifest.json -type f -print0 2>/dev/null | sort -z)
          printf 'agent_evidence_status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "::warning::scripts/agent-evidence exited with status $status"
          fi

      - name: Summarize agent evidence
        if: always()
        run: |
          set -eu
          manifest="$RUNNER_TEMP/rucksack-ci-manifest.json"
          status="${{ steps.agent_evidence.outputs.agent_evidence_status }}"
          echo "### Rucksack agent evidence" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: \`${status:-not-run}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact: \`rucksack-ci-evidence-${{ github.run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download: \`gh run download ${{ github.run_id }} --name rucksack-ci-evidence-${{ github.run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Manifest artifact: \`rucksack-ci-manifest-${{ github.run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Manifest download: \`gh run download ${{ github.run_id }} --name rucksack-ci-manifest-${{ github.run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "$manifest" ]; then
            echo "- Manifest: \`$manifest\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Manifest: not found" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload agent evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rucksack-ci-evidence-${{ github.run_id }}
          path: .agent/evidence
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload agent evidence manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rucksack-ci-manifest-${{ github.run_id }}
          path: ${{ runner.temp }}/rucksack-ci-manifest.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Node lint, typecheck, and tests
        run: |
          set -eu
          if [ ! -f package.json ]; then
            echo "no package.json; skipping Node checks"
            exit 0
          fi
          if [ -f "$RUNNER_TEMP/rucksack-node-runner" ]; then
            runner="$(cat "$RUNNER_TEMP/rucksack-node-runner")"
          else
            corepack enable || true
            if [ -f pnpm-lock.yaml ]; then
              pnpm install --frozen-lockfile
              runner=pnpm
            elif [ -f yarn.lock ]; then
              yarn install --frozen-lockfile
              runner=yarn
            elif [ -f package-lock.json ]; then
              npm ci
              runner=npm
            else
              npm install
              runner=npm
            fi
          fi
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.lint?0:1)"; then
            $runner run lint
          else
            echo "no lint script"
          fi
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.build?0:1)"; then
            $runner run build
          else
            echo "no build script"
          fi
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s['type-check']?0:1)"; then
            $runner run type-check
          elif node -e "const s=require('./package.json').scripts||{}; process.exit(s.typecheck?0:1)"; then
            $runner run typecheck
          else
            echo "no typecheck script"
          fi
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.test?0:1)"; then
            $runner run test
          else
            echo "no test script"
          fi

      - name: Python tests
        run: |
          set -eu
          if [ -d tests ] && find tests -name 'test*.py' -print -quit | grep -q .; then
            python -m pip install --upgrade pip
            python -m pip install -e . || true
            python -m unittest discover -s tests
          else
            echo "no Python unittest tests detected"
          fi

      - name: Dependency and security checks
        run: |
          set -eu
          if [ -f package-lock.json ] && [ ! -f pnpm-lock.yaml ] && [ ! -f yarn.lock ]; then
            npm audit --audit-level=high
          elif [ -f pnpm-lock.yaml ] || [ -f yarn.lock ]; then
            echo "non-npm lockfile present; skipping npm audit"
          fi
          if [ -f pyproject.toml ] || [ -f requirements.txt ]; then
            python -m pip check || true
          fi

      - name: OpenTofu/Terraform validation
        run: |
          set -eu
          if ! find . -name '*.tf' -not -path './.git/*' -print -quit | grep -q .; then
            echo "no .tf files detected"
            exit 0
          fi
          if command -v tofu >/dev/null 2>&1; then
            tofu fmt -check -recursive
            tofu init -backend=false
            tofu validate
          elif command -v terraform >/dev/null 2>&1; then
            terraform fmt -check -recursive
            terraform init -backend=false
            terraform validate
          else
            echo "::warning::OpenTofu/Terraform files detected but neither tofu nor terraform is installed"
          fi
